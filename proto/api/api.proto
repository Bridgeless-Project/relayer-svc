syntax = "proto3";

package api;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/any.proto";
import "deposit.proto";
import "protoc-gen-openapiv2/options/annotations.proto";


option go_package = "github.com/Bridgeless-Project/relayer-svc/internal/api/types";

message SubmitResponse {
  string withdrawal_id = 1;
}

message CheckWithdrawalResponse {
  deposit.DepositIdentifier deposit_identifier = 1;
  deposit.TransferData transfer_data = 2;
  deposit.WithdrawalStatus withdrawal_status = 3;
  deposit.WithdrawalIdentifier withdrawal_identifier = 4;
}

message GetWithdrawalsByStatusRequest {
  deposit.WithdrawalStatus withdrawal_status = 1;
  uint64 page = 2;
  uint64 number = 3;
}

message GetWithdrawalsByStatusResponse {
  repeated CheckWithdrawalResponse withdrawal = 1;
}

service API {
  rpc SubmitWithdrawal(deposit.DepositIdentifier) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/submit"
      body: "*"
    };
  }

  rpc CheckWithdrawal(deposit.DepositIdentifier) returns (CheckWithdrawalResponse) {
    option (google.api.http) = {
      get: "/check/{chain_id}/{tx_hash}/{tx_nonce}"
    };
  }

  rpc GetWithdrawalsByStatus(GetWithdrawalsByStatusRequest) returns (GetWithdrawalsByStatusResponse) {
    option (google.api.http) = {
      get: "/get"
    };
  }

  rpc CheckHealth(google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      get: "/health"
    };
  }
}