syntax = "proto3";

package deposit;

option go_package = "github.com/Bridgeless-Project/relayer-svc/internal/types";

enum WithdrawalStatus {
  WITHDRAWAL_STATUS_UNSPECIFIED = 0;
  WITHDRAWAL_STATUS_PENDING = 1;
  WITHDRAWAL_STATUS_PROCESSING = 2;
  WITHDRAWAL_STATUS_SUBMITTING_TO_CORE =3;
  WITHDRAWAL_STATUS_PROCESSED = 4;
  WITHDRAWAL_STATUS_FAILED = 5;
  WITHDRAWAL_STATUS_ALREADY_WITHDRAWN= 6;
}

message DepositIdentifier {
  string tx_hash = 1;
  int64  tx_nonce = 2;
  string chain_id = 3;
}

message WithdrawalIdentifier {
  optional string tx_hash = 1;
  string chain_id = 2;
  optional int64 withdrawal_core_block = 3;
  optional int64 withdrawal_chain_block = 4;
  string operator = 5;
}

message TransferData {
  optional string sender = 1;
  string receiver = 2;

  string deposit_amount = 3;
  string withdrawal_amount = 4;
  string commission_amount = 5;

  string deposit_asset = 6;
  string withdrawal_asset = 7;
  bool is_wrapped_asset = 8;

  int64 deposit_block = 9;

  // used for EVM transfers
  optional string signature = 10;
  string merkle_proof = 11;
  string tx_data = 12;
}

message Recovery {
  int32 attempts = 1;
  int64 timestamp = 2;
}
