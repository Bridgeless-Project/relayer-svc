log:
  level: debug
  disable_sentry: true

db:
  url: postgres://example:example@example-1-example:0000/example?sslmode=true

listeners:
  api_http_addr: :0000
  api_grpc_addr: :0000


observer:
  tendermint_rpc: ""
  retry_attempts: 0
  retry_timeout_sec: 0
  polling_interval_sec: 0

core_connector:
  wallet: ""
  connection:
    addr: ""
    enable_tls: false
  settings:
    chain_id: ""
    denom: ""
    min_gas_price: 0

chains:
  list:
    - id: "evm1"
      type: "EVM"
      rpc: "rpc"
      operator_private_key: "priv_key"
      bridge_address: "0x00000000000000000000000"

    - id: "evm2"
      type: "EVM"
      rpc: "rpc"
      operator_private_key : "priv_key"
      bridge_address: "0x00000000000000000000000"


